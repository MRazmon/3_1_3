<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body th:replace="~{layout :: layout('User panel', ~{::main})}">
<main>
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand">
            <span th:text="${user.email}">email@example.com</span>
            with roles:
            <span th:each="r : ${currentUser.roles}"
                  th:text="${#strings.substringAfter(r.name, 'ROLE_')}"
                  class="me-1">
</span>
        </span>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light">Logout</button>
        </form>
    </nav>

    <div class="row">
        <!-- левый сайдбар -->
        <div class="col-md-2">
            <div class="list-group mb-3">
                <a th:href="@{/admin/users}"
                   class="list-group-item list-group-item-action"
                   sec:authorize="hasRole('ADMIN')">
                    Admin
                </a>
                <a href="#"
                   class="list-group-item list-group-item-action active">
                    User
                </a>
            </div>
        </div>

        <!-- основной контент -->
        <div class="col-md-10">
            <h2 class="mb-3">User information-page</h2>

            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link active" href="#">About user</a>
                </li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="userInfo">
                    <div class="card">
                        <div class="card-header">
                            About user
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-striped table-hover mb-0">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr>
                                        <td th:text="${user.id}"></td>
                                        <td th:text="${user.name}"></td>
                                        <td th:text="${user.surename}"></td>
                                        <td th:text="${user.age}"></td>
                                        <td th:text="${user.email}"></td>
                                        <td>
                                        <span th:each="r : ${user.roles}"
                                              th:text="${#strings.substringAfter(r.name, 'ROLE_')}"
                                              class="me-1">
                                        </span>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div><!-- /tab-pane -->
            </div><!-- /tab-content -->
        </div><!-- /col-md-10 -->
    </div><!-- /row -->
</main>
</body>
</html>
