<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'App'">App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</head>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        console.log('LAYOUT SCRIPT LOADED');

        var editModal = document.getElementById('editUserModal');
        console.log('editModal =', editModal);

        if (!editModal) return;

        editModal.addEventListener('show.bs.modal', function (event) {
            console.log('show.bs.modal fired', event);

            var button = event.relatedTarget;
            if (!button) return;

            var id = button.getAttribute('data-id');
            var name = button.getAttribute('data-name');
            var surename = button.getAttribute('data-surename');
            var age = button.getAttribute('data-age');
            var email = button.getAttribute('data-email');

            console.log('FILL MODAL: id=', id, 'name=', name);

            var idInput = document.getElementById('edit-id');
            if (idInput) idInput.value = id || '';
            document.getElementById('edit-name').value = name || '';
            document.getElementById('edit-surename').value = surename || '';
            document.getElementById('edit-age').value = age || '';
            document.getElementById('edit-email').value = email || '';
            document.getElementById('edit-password').value = '';
        });
    });
    var rolesSelect = document.getElementById('edit-roles');
    if (rolesSelect) {
        // Очистить выбор
        Array.from(rolesSelect.options).forEach(function (opt) {
            opt.selected = false;
        });

        // Роли приходят строкой вида "ROLE_USER ROLE_ADMIN"
        var rolesString = button.getAttribute('data-roles') || '';
        var roleNames = rolesString.split(' ').filter(Boolean);

        Array.from(rolesSelect.options).forEach(function (opt) {
            if (roleNames.includes(opt.text)) {
                opt.selected = true;
            }
        });
    }

</script>

<body class="bg-light">

<main class="container py-4" th:insert="${content}"></main>

</body>
</html>
